<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<!-- Social/OG meta lives here, not <svelte:head>: the demo deploy is CSR-only
		     (ssr = !isDemo), so crawlers only ever see this static head. -->
		<meta
			name="description"
			content="A personal timesheet tracker for the close-then-open shift. Punch the clock, log hours and leave, and see at a glance whether you worked the hours you owe — and whether your pay is right."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Clopen" />
		<meta property="og:title" content="Clopen — personal timesheet tracker" />
		<meta
			property="og:description"
			content="Did I work the hours I owe, and is my pay right? Punch clock, ledger, leave tracking, and make-whole math in one place."
		/>
		<meta property="og:url" content="https://clopen-production.up.railway.app/" />
		<meta property="og:image" content="https://clopen-production.up.railway.app/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta
			property="og:image:alt"
			content="The Clopen dashboard asking “Did I make it?” — 4 hours ahead of pace, with logged vs. expected hours and earnings for the bi-week."
		/>
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Clopen — personal timesheet tracker" />
		<meta
			name="twitter:description"
			content="Did I work the hours I owe, and is my pay right? Punch clock, ledger, leave tracking, and make-whole math in one place."
		/>
		<meta name="twitter:image" content="https://clopen-production.up.railway.app/og.png" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
		%sveltekit.head%
		<script>
			// Apply the saved theme before first paint to avoid FOUC.
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var dark =
						stored === 'dark' ||
						(!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (_) {}
			})();
		</script>
	</head>
	<!-- preload-code="eager" fetches the other routes' JS right after load, so the
	     first visit to each tab is as instant as repeat visits (no hover on touch). -->
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="eager">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
