<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
		<script>
			// Apply the saved theme before first paint to avoid FOUC.
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var dark =
						stored === 'dark' ||
						(!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (_) {}
			})();
		</script>
	</head>
	<!-- preload-code="eager" fetches the other routes' JS right after load, so the
	     first visit to each tab is as instant as repeat visits (no hover on touch). -->
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="eager">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
