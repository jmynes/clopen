# Railway configuration, modeled on punt's demo deploy: PUBLIC_DEMO=1 keeps
# every value in the browser's localStorage, so no database or volume is
# needed. (A non-demo deploy instead wants a volume at /data plus
# DATABASE_URL=file:/data/clopen.db; deploy:start runs migrations for it.)

[build]
builder = "NIXPACKS"
buildCommand = "bun install && bun run build"

[deploy]
startCommand = "bun run deploy:start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
