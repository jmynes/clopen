# Railway configuration, modeled on punt's. Single service; the SQLite file
# lives on a mounted volume (set DATABASE_URL=file:/data/clopen.db and attach
# a volume at /data). Migrations run at boot so the schema tracks deploys.

[build]
builder = "NIXPACKS"
buildCommand = "bun install && bun run build"

[deploy]
startCommand = "bun run db:migrate && bun run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
